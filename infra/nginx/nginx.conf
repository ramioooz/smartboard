# ─────────────────────────────────────────────────────────────────────────────
# Smartboard — Nginx reverse proxy / load balancer
#
# Sits in front of one or more gateway replicas.
# Scale the gateway with:
#   docker compose -f infra/compose.yaml up -d --scale gateway=3
#
# Traffic flow:
#   Browser/cURL → nginx:80 → round-robin → gateway:4000 (N replicas)
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones (Layer 1 — IP-based, before the app is hit) ──────────
#
# Two zones keyed by client IP ($binary_remote_addr is 4 or 16 bytes vs the
# text form — saves ~50 % memory in the shared zone).
#
# global_rl  — general API traffic cap; 100 req/s average with a burst of 200.
#              Absorbs legitimate spikes while blocking floods / DoS.
#
# auth_rl    — tight cap for authentication endpoints (login, token refresh).
#              10 req/min per IP (≈1 every 6 s) with a burst of 5 to allow a
#              small flurry of retries but shut down brute-force quickly.
#
# 10 MB zone ≈ 160,000 IPs tracked simultaneously (safe for most deployments).
# ─────────────────────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=global_rl:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_rl:10m   rate=10r/m;

# Return 429 Too Many Requests (RFC 6585) instead of nginx default 503
limit_req_status 429;

# Docker's embedded DNS — required so nginx re-resolves "gateway" on every
# request and picks up new replicas added by --scale without restarting nginx.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # ── Common proxy headers ──────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward the nginx-generated request id so the gateway can log it
    proxy_set_header X-Request-Id      $request_id;

    # ── Login endpoint — tight brute-force protection ────────────────────────
    # Restrict only the credential-issuing endpoint. Profile and preference
    # routes under /api/auth/* should not inherit the login brute-force cap.
    # burst=5 nodelay: allow a quick burst of 5 then enforce 10r/min strictly.
  location ~ ^/api/auth/(login|session|session/refresh|oidc/start)$ {
        limit_req zone=auth_rl burst=5 nodelay;

        set $upstream http://gateway:4000;
        proxy_pass $upstream;

        proxy_set_header Connection '';
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
    }

    # ── SSE stream — /api/realtime/* ─────────────────────────────────────────
    # Server-Sent Events require:
    #   1. HTTP/1.1 keep-alive to upstream
    #   2. Proxy buffering OFF — otherwise frames are held until the buffer fills
    #   3. Long read timeout — SSE connections stay open for minutes/hours
    # No rate limit on the SSE stream itself — one long-lived connection per user.
    location /api/realtime/ {
        set $upstream http://gateway:4000;
        proxy_pass $upstream;

        proxy_set_header   Connection '';   # keep-alive (no Upgrade)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;          # 24 h — persistent SSE connections
        proxy_send_timeout 86400s;
        proxy_connect_timeout 5s;
    }

    # ── Health endpoints — no rate limit (used by load balancer probes) ───────
    location /health/ {
        set $upstream http://gateway:4000;
        proxy_pass $upstream;

        proxy_set_header Connection '';
        proxy_read_timeout  10s;
        proxy_connect_timeout 5s;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    # Using $upstream variable (not a static upstream{} block) forces nginx to
    # re-resolve "gateway" via Docker DNS on each request, which distributes
    # load across all replicas returned by the embedded DNS round-robin.
    # burst=200 nodelay: absorb short spikes without queuing; excess is 429.
    location / {
        limit_req zone=global_rl burst=200 nodelay;

        set $upstream http://gateway:4000;
        proxy_pass $upstream;

        proxy_set_header  Connection '';
        proxy_read_timeout  30s;
        proxy_connect_timeout 5s;
    }
}
